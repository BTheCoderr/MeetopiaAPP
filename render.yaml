services:
  - type: web
    name: meetopia-signaling
    env: node
    root: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3003
      - key: CORS_ORIGINS
        value: https://meetopia-live.netlify.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REPORT_NOTIFY_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: REPORT_FROM_EMAIL
        sync: false
      - key: REPORT_ADMIN_TOKEN
        sync: false
    healthCheckPath: /health
    autoDeploy: true 